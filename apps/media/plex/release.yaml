apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: plex
spec:
  releaseName: plex
  chart:
    spec:
      chart: plex
      sourceRef:
        kind: HelmRepository
        name: k8s-at-home
        namespace: flux-system
      version: ~6.3
  interval: 5m
  values:
    image:
      repository: ghcr.io/home-operations/plex
      tag: rolling
      pullPolicy: Always
    env:
      PUID: "1001"
      PGID: "1001"
      TZ: "America/Edmonton"
      ALLOWED_NETWORKS: 10.0.0.0/8,192.168.0.0/24,plex.samsonnguyen.ca
      HOSTNAME: plex.samsonnguyen.ca
      PLEX_CLAIM_TOKEN: "claim-x-ax3Ytgqb9gTsk6AUVY"
    envValueFrom:
      PLEX_CLAIM:
        secretKeyRef:
          name: plex-claim
          key: claim
    persistence:
      config:
        enabled: true
        accessMode: ReadWriteOnce
        storageClass: local-hostpath
        type: pvc
        size: 15Gi
      shared:
        enabled: true
        type: pvc
        existingClaim: plex-shared
      shared-tv:
        enabled: true
        type: pvc
        existingClaim: plex-shared-tv
      # transcode:
      #   enabled: true
      #   accessMode: ReadWriteOnce
      #   emptyDir:
      #     enabled: true
      #     medium: Memory
      #   mountPath: /transcode
      #   size: "6Gi"
    service:
      main:
        type: LoadBalancer
        loadBalancerIP: 10.0.11.3
    podSecurityContext:
      runAsUser: 1001
      runAsGroup: 1001
      fsGroup: 1001
      # Hardware acceleration using an Intel iGPU w/ QuickSync
      # These IDs below should be matched to your `video` and `render` group on the host
      # To obtain those IDs run the following grep statement on the host:
      # $ cat /etc/group | grep "video\|render"
      # video:x:44:
      # render:x:109:
      supplementalGroups:
        - 998
        - 39
    resources:
      requests:
        # Hardware acceleration using an Intel iGPU w/ QuickSync and
        # using intel-gpu-plugin (https://github.com/intel/intel-device-plugins-for-kubernetes)
        gpu.intel.com/i915: 1
        nvidia.com/gpu: 1
        cpu: 400m
        memory: 1024Mi
      limits:
        # Hardware acceleration using an Intel iGPU w/ QuickSync and
        # using intel-gpu-plugin (https://github.com/intel/intel-device-plugins-for-kubernetes)
        gpu.intel.com/i915: 1
        nvidia.com/gpu: 1
        memory: 8192Mi
    podAnnotations:
      backup.velero.io/backup-volumes: config
